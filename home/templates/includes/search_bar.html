{% load static %}

<style>
.tab-btn{
background:transparent;
color:var(--tabColor);
border:1px solid var(--tabColor);
font-weight:600;
transition:0.3s;
}

/* Hover */
.tab-btn:hover{
background:var(--tabColor);
color:white;
}

/* Active */
.tab-btn.active{
background:var(--tabColor);
color:white;
border-color:var(--tabColor);
font-weight:700;
}

/* Active par hover change nahi hoga */
.tab-btn.active:hover{
background:var(--tabColor);
color:white;
}
.tab-btn.active{
background:var(--tabColor);
color:white;
border-color:var(--tabColor);
font-weight:700;
}
</style>

<section class="bg-[#eef3f6] py-20" style="--tabColor: {{ slider.tabs_color|default:'#2b8cc9' }};">

  <div class="max-w-7xl mx-auto px-6 grid lg:grid-cols-2 gap-10 items-center">

    <!-- LEFT CONTENT -->
    <div>

      <h2 class="text-4xl md:text-4xl mb-3 font-bold" style="color: {{ slider.headeing_color|default:'#2b7dbb' }}; font-family: Georgia, serif;">
        {{ slider.heading }}
      </h2>

      <h1 class="text-5xl md:text-6xl uppercase font-extrabold text-gray-800 mb-6">
        {{ slider.subtitle }}
      </h1>

      <p class="text-gray-600 max-w-lg mb-8">
        {{ slider.short_description }}
      </p>


      <!-- Tabs -->
      <div id="hero-tabs" class="flex flex-wrap gap-3 mb-6">

        <button class="tab-btn active text-center px-4 py-2 rounded-md font-semibold shadow">
          Buy
        </button>

        <button class="tab-btn text-center px-4 py-2 rounded-md font-semibold">
          New Projects
        </button>

        <button class="tab-btn text-center px-4 py-2 rounded-md font-semibold">
          Rent
        </button>

      </div>

      <!-- SEARCH BOX -->
      <div class="flex items-center bg-white rounded-md shadow-lg overflow-visible max-w-xl relative">

        <select id="propertyType" class="px-1 py-3 outline-none text-gray-600 border-r">
          <option>Residential</option>
          <option>Commercial</option>
        </select>

        <div class="relative flex-1">

          <input id="searchInput" required type="text" placeholder="Select City, Locality, Developer Or Projects Name" class="w-full px-4 py-3 outline-none" />

          <ul id="suggestionBox" class="absolute left-0 right-0 top-full bg-white border border-gray-200 rounded-b-lg shadow-xl max-h-56 overflow-y-auto hidden z-50">
          </ul>

        </div>

        <button id="searchButton" class="text-white px-4 py-3 font-semibold transition bg-[{{ slider.search_btn_color }}]">
          Search
        </button>

      </div>

    </div>

    <!-- RIGHT IMAGE -->
    <div class="relative flex justify-center">

      <img src="{{ slider.image.url }}" class="w-[420px] md:w-[500px]" alt="Mumbai"/>

    </div>

  </div>

</section>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const tabs = document.querySelectorAll("#hero-tabs .tab-btn");

    tabs.forEach(tab => {

    tab.addEventListener("click", function(){

    tabs.forEach(btn => btn.classList.remove("active"));

    this.classList.add("active");

    });

  });

});
</script>


<script>
document.addEventListener("DOMContentLoaded", function () {

  /* =========================
     DEBOUNCE FUNCTION
  ========================== */
  function debounce(callback, delay = 350) {
    let timer;
    return function (...args) {
      clearTimeout(timer);
      timer = setTimeout(() => callback.apply(this, args), delay);
    };
  }

  /* =========================
     ELEMENTS
  ========================== */
  const desktopInput = document.getElementById("searchInput");
  const desktopBox = document.getElementById("suggestionBox");
  const desktopBtn = document.getElementById("searchButton");

  const mobileInput = document.getElementById("mobileSearchInput");
  const mobileBtn = document.getElementById("mobileSearchButton");

  /* =========================
     FETCH SUGGESTIONS
  ========================== */
  async function fetchSuggestions(query, suggestionBox, inputField) {

    if (!suggestionBox) return;

    if (query.length < 1) {
      suggestionBox.classList.add("hidden");
      return;
    }

    try {
      const response = await fetch(`/projects/api/search-suggestions/?q=${encodeURIComponent(query)}`);

      if (!response.ok) throw new Error("Network error");

      const data = await response.json();
      suggestionBox.innerHTML = "";

      if (!data.length) {
        suggestionBox.innerHTML =
          `<li class="px-4 py-2 text-sm text-gray-500">No results found</li>`;
        suggestionBox.classList.remove("hidden");
        return;
      }

      data.forEach(item => {
        const li = document.createElement("li");
        li.className =
          "px-4 py-2 text-sm cursor-pointer hover:bg-gray-100 flex justify-between items-center";

        li.innerHTML = `
          <span>${item.name}</span>
          <span class="text-xs text-gray-400">${item.type}</span>
        `;

        li.addEventListener("click", () => {

          // Smart redirect based on type
          if (item.type === "Project") {
            window.location.href =
              `/projects/search/?q=${encodeURIComponent(item.name)}`;
          }

          else if (item.type === "Developer") {
            window.location.href =
              `/projects/search/?q=${encodeURIComponent(item.name)}`;
          }

          else if (item.type === "Locality") {
            window.location.href =
              `/projects/search/?q=${encodeURIComponent(item.name)}`;
          }

          else if (item.type === "City") {
            window.location.href =
              `/projects/search/?q=${encodeURIComponent(item.name)}`;
          }

          suggestionBox.classList.add("hidden");
        });

        suggestionBox.appendChild(li);
      });

      suggestionBox.classList.remove("hidden");

    } catch (error) {
      suggestionBox.innerHTML =
        `<li class="px-4 py-2 text-sm text-red-500">Error loading</li>`;
      suggestionBox.classList.remove("hidden");
    }
  }

  /* =========================
     DESKTOP SEARCH
  ========================== */
  const desktopSearch = debounce((value) => {
    fetchSuggestions(value, desktopBox, desktopInput);
  });

  desktopInput?.addEventListener("input", (e) => {
    desktopSearch(e.target.value.trim());
  });



  
  /* =========================
     CLOSE DROPDOWN ON OUTSIDE CLICK
  ========================== */
  document.addEventListener("click", function (e) {

    if (!e.target.closest("#searchInput")) {
      desktopBox?.classList.add("hidden");
    }

    if (!e.target.closest("#mobileSearchInput")) {
      mobileBox?.classList.add("hidden");
    }

  });

});

</script>
