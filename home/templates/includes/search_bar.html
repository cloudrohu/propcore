{% load static %}

<style>
  .tab-btn {
    background: transparent;
    border: 1px solid var(--tabColor);
    color: var(--tabColor);
    transition: all 0.3s ease;
  }

  .tab-btn:hover {
    background: var(--tabColor);
    color: #fff;
  }

  .tab-btn.active {
    background: var(--tabColor);
    color: #fff;
    font-weight: 600;
  }
</style>

<section class="relative py-32 bg-cover bg-center" style="background-image:url('{{ slider.image.url }}'); --tabColor: {{ slider.tabs_color|default:'#2b8cc9' }};">

  <!-- Overlay -->
  <div class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>

  <div class="relative max-w-6xl mx-auto px-6 flex flex-col items-center text-center text-white">

    <!-- TAGLINE -->
    <p class="text-sm tracking-[3px] uppercase text-gray-300 mb-3">
      #letsfindyourperfecthometogether
    </p>

    <!-- HEADING -->
    <h2 class="text-3xl md:text-4xl font-medium text-gray-200 mb-2">
      {{ slider.heading }}
    </h2>

    <!-- MAIN TITLE -->
    <h1 class="text-5xl md:text-6xl font-bold leading-tight mb-6 text-uppercase">
      <span class="bg-gradient-to-r from-white via-gray-200 to-gray-400 bg-clip-text text-transparent">
        {{ slider.subtitle }}
      </span>
    </h1>

    <!-- DESCRIPTION -->
    <p class="text-gray-300 max-w-2xl mb-8 text-lg">
      15+ Years Experience • Verified Properties • Best Deals in Mumbai
    </p>

    <!-- TABS -->
    <div id="hero-tabs" class="flex gap-3 mb-8">
      <button class="tab-btn active px-5 py-2 rounded-md shadow">Buy</button>
      <button class="tab-btn px-5 py-2 rounded-md shadow">New Projects</button>
      <button class="tab-btn px-5 py-2 rounded-md shadow">Rent</button>
    </div>

    <!-- SEARCH BOX (WIDE + LUXURY) -->
    <div class="flex items-center bg-white/95 backdrop-blur-md  shadow-2xl overflow-hidden w-full max-w-4xl mb-10">

      <select class="px-4 py-3 outline-none text-gray-600 border-r bg-transparent">
        <option>Residential</option>
        <option>Commercial</option>
      </select>

      <input id="searchInput" type="text" placeholder="Search City, Locality, Developer or Project" class="flex-1 px-5 py-3 outline-none text-gray-700 text-lg"/>

      <button id="searchButton" class="bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white px-8 py-3 font-semibold text-lg transition">
        Search
      </button>
    </div>

    <!-- CTA BUTTONS (UNIFORM BLUE THEME) -->
    <div class="flex flex-wrap gap-4 justify-center">

      <!-- CALL -->
      <a href="tel:{{settings_obj.phone}}" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 px-6 py-2.5  shadow-lg transition">
        <i class="fa-solid fa-phone"></i> Call Now
      </a>

      <!-- WHATSAPP -->
      <a href="https://wa.me/91{{settings_obj.phone}}" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 px-6 py-2.5  shadow-lg transition">
        <i class="fa-brands fa-whatsapp"></i> WhatsApp
      </a>

      <!-- SITE VISIT -->
      <a href="{% url 'contact' %}" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 px-6 py-2.5  shadow-lg transition">
        <i class="fa-solid fa-calendar-check"></i> Book Visit
      </a>

    </div>

  </div>
</section>


<script>
  document.addEventListener("DOMContentLoaded", function () {

    const tabs = document.querySelectorAll("#hero-tabs .tab-btn");

      tabs.forEach(tab => {

      tab.addEventListener("click", function(){

      tabs.forEach(btn => btn.classList.remove("active"));

      this.classList.add("active");

      });

    });

  });
</script>


<script>
  document.addEventListener("DOMContentLoaded", function () {

    /* =========================
      DEBOUNCE FUNCTION
    ========================== */
    function debounce(callback, delay = 350) {
      let timer;
      return function (...args) {
        clearTimeout(timer);
        timer = setTimeout(() => callback.apply(this, args), delay);
      };
    }

    /* =========================
      ELEMENTS
    ========================== */
    const desktopInput = document.getElementById("searchInput");
    const desktopBox = document.getElementById("suggestionBox");
    const desktopBtn = document.getElementById("searchButton");

    const mobileInput = document.getElementById("mobileSearchInput");
    const mobileBtn = document.getElementById("mobileSearchButton");

    /* =========================
      FETCH SUGGESTIONS
    ========================== */
    async function fetchSuggestions(query, suggestionBox, inputField) {

      if (!suggestionBox) return;

      if (query.length < 1) {
        suggestionBox.classList.add("hidden");
        return;
      }

      try {
        const response = await fetch(`/projects/api/search-suggestions/?q=${encodeURIComponent(query)}`);

        if (!response.ok) throw new Error("Network error");

        const data = await response.json();
        suggestionBox.innerHTML = "";

        if (!data.length) {
          suggestionBox.innerHTML =
            `<li class="px-4 py-2 text-sm text-gray-500">No results found</li>`;
          suggestionBox.classList.remove("hidden");
          return;
        }

        data.forEach(item => {
          const li = document.createElement("li");
          li.className =
            "px-4 py-2 text-sm cursor-pointer hover:bg-gray-100 flex justify-between items-center";

          li.innerHTML = `
            <span>${item.name}</span>
            <span class="text-xs text-gray-400">${item.type}</span>
          `;

          li.addEventListener("click", () => {

            // Smart redirect based on type
            if (item.type === "Project") {
              window.location.href =
                `/projects/search/?q=${encodeURIComponent(item.name)}`;
            }

            else if (item.type === "Developer") {
              window.location.href =
                `/projects/search/?q=${encodeURIComponent(item.name)}`;
            }

            else if (item.type === "Locality") {
              window.location.href =
                `/projects/search/?q=${encodeURIComponent(item.name)}`;
            }

            else if (item.type === "City") {
              window.location.href =
                `/projects/search/?q=${encodeURIComponent(item.name)}`;
            }

            suggestionBox.classList.add("hidden");
          });

          suggestionBox.appendChild(li);
        });

        suggestionBox.classList.remove("hidden");

      } catch (error) {
        suggestionBox.innerHTML =
          `<li class="px-4 py-2 text-sm text-red-500">Error loading</li>`;
        suggestionBox.classList.remove("hidden");
      }
    }

    /* =========================
      DESKTOP SEARCH
    ========================== */
    const desktopSearch = debounce((value) => {
      fetchSuggestions(value, desktopBox, desktopInput);
    });

    desktopInput?.addEventListener("input", (e) => {
      desktopSearch(e.target.value.trim());
    });



    
    /* =========================
      CLOSE DROPDOWN ON OUTSIDE CLICK
    ========================== */
    document.addEventListener("click", function (e) {

      if (!e.target.closest("#searchInput")) {
        desktopBox?.classList.add("hidden");
      }

      if (!e.target.closest("#mobileSearchInput")) {
        mobileBox?.classList.add("hidden");
      }

    });

  });
</script>
