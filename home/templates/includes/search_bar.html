{% load static %}

<style>
  :root {
    --primary-blue: #2b8cc9;
    --luxury-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.3);
  }

  .tab-btn {
    background: transparent;
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.3);
    backdrop-filter: blur(5px);
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .tab-btn:hover {
    background: var(--tabColor);
    border-color: var(--tabColor);
    transform: translateY(-2px);
  }

  .tab-btn.active {
    background: var(--tabColor);
    color: white;
    border-color: var(--tabColor);
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
  }

  /* Glassmorphism effect for search bar */
  .search-container {
    box-shadow: var(--luxury-shadow);
  }

  .cta-blue {
    background: linear-gradient(135deg, #2b8cc9 0%, #1a5f8b 100%);
    transition: all 0.3s ease;
  }

  .cta-blue:hover {
    filter: brightness(1.1);
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(43, 140, 201, 0.4);
  }
  #suggestionBox li {
    padding: 12px 16px;
    border-bottom: 1px solid #eee;
    cursor: pointer;
    transition: background 0.2s;
  }

  #suggestionBox li:hover {
      background-color: #f0f7ff; /* Halka blue color hover par */
  }

  #suggestionBox li:last-child {
      border-bottom: none;
  }
</style>

<section class="relative py-22 md:py-24 bg-cover bg-center md:bg-cover" style="background-image:url('{{ slider.image.url }}'); --tabColor: {{ slider.tabs_color|default:'#2b8cc9' }};">

    <div class="absolute inset-0 bg-black/60"></div>

    <div class="relative max-w-6xl mx-auto px-6 flex flex-col items-center text-center text-white pt-20 md:pt-20" 

      <a href="/" class="flex-shrink-0 md:mb-3 p-3">
          {% if settings_obj.logo %}
            <img src="{{ settings_obj.logo.url }}" class="p-2 h-[12vh] md:h-[15vh] object-contain border border-white/30 rounded-full bg-white shadow-lg" alt="Logo">
          {% else %}
            <div class="text-xl md:text-2xl font-bold text-[#ff5a5f] flex items-center gap-1">
              <i class="fa-solid fa-house-chimney"></i> <span class="hidden xs:inline">RealtyPro</span>
            </div>
          {% endif %}
      </a>

      <p class="text-xs md:text-sm tracking-[0.3em] uppercase text-blue-400 font-bold mb-2 mt-2 md:mb-4">
          #letsfindyourperfecthometogether
      </p>

      <div class="flex items-center gap-4 text-sm md:text-base text-gray-300 mb-3 md:mb-6 font-medium">
          <span class="border-r border-gray-500 pr-4">15+ Years Experience</span>
          <span class="border-r border-gray-500 pr-4">Verified Properties</span>
          <span>Best Deals in Mumbai</span>
      </div>


      <div id="hero-tabs" class="flex flex-nowrap md:flex-wrap gap-2 mb-4 overflow-x-auto no-scrollbar">
          <button class="tab-btn active px-3 md:px-4 py-2 rounded-md text-[10px] md:text-sm font-bold uppercase tracking-wider whitespace-nowrap">
              Buy
          </button>
          <button class="tab-btn px-4 md:px-6 py-2 rounded-md text-[10px] md:text-sm font-bold uppercase tracking-wider whitespace-nowrap">
              New Projects
          </button>
          <button class="tab-btn px-4 md:px-6 py-2 rounded-md text-[10px] md:text-sm font-bold uppercase tracking-wider whitespace-nowrap">
              Rent
          </button>
      </div>

      <div class="search-container flex flex-row items-center bg-white shadow-2xl overflow-visible w-full max-w-4xl mb-4 md:mb-6">
        
        <select id="propertyType" class="w-24 md:w-40 px-2 md:px-6 py-2 outline-none text-gray-700 font-semibold border-r border-gray-100 bg-gray-50/50 text-xs md:text-base">
          <option>Residential</option>
          <option>Commercial</option>
        </select>

        <div class="relative flex-1">
          <input id="searchInput" required type="text" autocomplete="off" placeholder="Search City, Locality..." class="w-full px-3 md:px-6 py-2 outline-none text-gray-800 placeholder-gray-400 text-sm md:text-lg"/>
          <ul id="suggestionBox" class="absolute left-0 right-0 top-full bg-white border border-gray-100 rounded-b-xl shadow-2xl max-h-64 overflow-y-auto hidden z-50 text-left text-black"></ul>
        </div>

        <button id="searchButton" class="w-auto text-white px-4 md:px-10 py-3 md:py-4 font-bold uppercase tracking-tighter md:tracking-widest transition-all bg-[{{ slider.search_btn_color|default:'#2b8cc9' }}] hover:opacity-90 text-xs md:text-base">
            Search
        </button>

      </div>

      <div class="flex flex-nowrap gap-2 justify-center w-full overflow-x-hidden mb-3 md:mb-6 ">

          <a href="tel:{{settings_obj.phone}}" class="cta-blue flex items-center gap-1.5 text-white px-2 md:px-8 py-2.5 font-bold shadow-lg text-xs md:text-base whitespace-nowrap">
            <i class="fa-solid fa-phone-volume"></i>
            <span>Call Now</span>
          </a>

          <a href="https://wa.me/91{{settings_obj.phone}}" class="cta-blue flex items-center gap-1.5 text-white px-2 md:px-8 py-2.5 font-bold shadow-lg text-xs md:text-base whitespace-nowrap">
            <i class="fa-brands fa-whatsapp text-lg"></i>
            <span>WhatsApp</span>
          </a>

          <a href="{% url 'contact' %}" class="cta-blue flex items-center gap-1.5 text-white px-2 md:px-8 py-2.5 font-bold shadow-lg border border-blue-400/30 text-xs md:text-base whitespace-nowrap">
            <i class="fa-solid fa-calendar-check"></i>
            <span>Book Visit</span>
          </a>
          
      </div>

    </div>

</section>

<script>
  // Tab Switching Logic
  document.addEventListener("DOMContentLoaded", function() {
    const tabs = document.querySelectorAll("#hero-tabs .tab-btn");
    tabs.forEach(tab => {
      tab.addEventListener("click", function() {
        tabs.forEach(btn => btn.classList.remove("active"));
        this.classList.add("active");
      });
    });
  });
</script>

<script>
  document.addEventListener("DOMContentLoaded", function () {

    /* =========================
      DEBOUNCE FUNCTION
    ========================== */
    function debounce(callback, delay = 350) {
      let timer;
      return function (...args) {
        clearTimeout(timer);
        timer = setTimeout(() => callback.apply(this, args), delay);
      };
    }

    /* =========================
      ELEMENTS
    ========================== */
    const desktopInput = document.getElementById("searchInput");
    const desktopBox = document.getElementById("suggestionBox");
    const desktopBtn = document.getElementById("searchButton");

    const mobileInput = document.getElementById("mobileSearchInput");
    const mobileBtn = document.getElementById("mobileSearchButton");

    /* =========================
      FETCH SUGGESTIONS
    ========================== */
    async function fetchSuggestions(query, suggestionBox, inputField) {

      if (!suggestionBox) return;

      if (query.length < 1) {
        suggestionBox.classList.add("hidden");
        return;
      }

      try {
        const response = await fetch(`/projects/api/search-suggestions/?q=${encodeURIComponent(query)}`);

        if (!response.ok) throw new Error("Network error");

        const data = await response.json();
        suggestionBox.innerHTML = "";

        if (!data.length) {
          suggestionBox.innerHTML =
            `<li class="px-4 py-2 text-sm text-gray-500">No results found</li>`;
          suggestionBox.classList.remove("hidden");
          return;
        }

        data.forEach(item => {
          const li = document.createElement("li");
          li.className =
            "px-4 py-2 text-sm cursor-pointer hover:bg-gray-100 flex justify-between items-center";

          li.innerHTML = `
            <span>${item.name}</span>
            <span class="text-xs text-gray-400">${item.type}</span>
          `;

          li.addEventListener("click", () => {

            // Smart redirect based on type
            if (item.type === "Project") {
              window.location.href =
                `/projects/search/?q=${encodeURIComponent(item.name)}`;
            }

            else if (item.type === "Developer") {
              window.location.href =
                `/projects/search/?q=${encodeURIComponent(item.name)}`;
            }

            else if (item.type === "Locality") {
              window.location.href =
                `/projects/search/?q=${encodeURIComponent(item.name)}`;
            }

            else if (item.type === "City") {
              window.location.href =
                `/projects/search/?q=${encodeURIComponent(item.name)}`;
            }

            suggestionBox.classList.add("hidden");
          });

          suggestionBox.appendChild(li);
        });

        suggestionBox.classList.remove("hidden");

      } catch (error) {
        suggestionBox.innerHTML =
          `<li class="px-4 py-2 text-sm text-red-500">Error loading</li>`;
        suggestionBox.classList.remove("hidden");
      }
    }

    /* =========================
      DESKTOP SEARCH
    ========================== */
    const desktopSearch = debounce((value) => {
      fetchSuggestions(value, desktopBox, desktopInput);
    });

    desktopInput?.addEventListener("input", (e) => {
      desktopSearch(e.target.value.trim());
    });



    
    /* =========================
      CLOSE DROPDOWN ON OUTSIDE CLICK
    ========================== */
    document.addEventListener("click", function (e) {

      if (!e.target.closest("#searchInput")) {
        desktopBox?.classList.add("hidden");
      }

      if (!e.target.closest("#mobileSearchInput")) {
        mobileBox?.classList.add("hidden");
      }

    });

  });
</script>
