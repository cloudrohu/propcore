{% load static %}

<header class="sticky top-0 z-50 border-b  shadow-sm font-sans" style="background:{{ settings_obj.header_footer_color }};color:{{ settings_obj.text_color }}">
  <div class="max-w-[1400px] mx-auto px-4 py-2">
    <div class="flex items-center justify-between gap-4">
      
      <a href="/" class="flex-shrink-0">
        {% if settings_obj.logo %}
          <img src="{{ settings_obj.logo.url }}" class="h-10 md:h-16 w-[120px] md:w-[150px] object-contain">
        {% else %}
          <div class="text-xl md:text-2xl font-bold text-[#ff5a5f] flex items-center gap-1">
             <i class="fa-solid fa-house-chimney"></i> <span class="hidden xs:inline">RealtyPro</span>
          </div>
        {% endif %}
      </a>

      <form action="{% url 'search_projects' %}" method="GET" class="hidden md:flex border border-slate-500 flex-1 max-w-md relative group mx-4">
          <input type="text" name="q"  placeholder="What are you looking for?" class="w-full bg-gray-100 border-none py-2.5 px-6 focus:ring-2 focus:ring-red-400 outline-none text-sm transition-all" required>
          <button type="submit" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-red-500">
              <i class="fa-solid fa-magnifying-glass"></i>
          </button>
      </form>

      <div class="flex items-center gap-3 md:gap-6">
          <nav class="hidden xl:flex items-center gap-6 text-[15px] font-medium text-gray-700">
              <a href="/" class="hover:text-red-500 transition">Home</a>
              <div class="relative inline-block text-left">
                  <button type="button" class="inline-flex items-center justify-between w-full py-2 font-medium text-gray-700 bg-transparent rounded-md hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2" id="menu-button" aria-expanded="true" aria-haspopup="true">
                  Properites
                  <svg class="w-5 h-5 ml-2 -mr-1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                      <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
                  </svg>
                  </button>

                  <div class="absolute right-0 w-56 mt-2 origin-top-right bg-white rounded-md shadow-lg ring-1 ring-black ring-opacity-5 focus:outline-none hidden" role="menu" aria-orientation="vertical" aria-labelledby="menu-button" id="dropdown-menu">
                  <div class="py-1" role="none">
                      <a href="{% url "search_projects" %}" class="block px-4 py-2 text-gray-700 hover:bg-gray-100" role="menuitem">Buy Properties</a>
                      <hr>
                      <a href="{% url "rent_list" %}" class="block px-4 py-2 text-gray-700 hover:bg-gray-100" role="menuitem">Rent Properties</a>
                  </div>
                  </div>
              </div>
              <a href="{% url 'calculator' %}" class="hover:text-red-500 transition">Calculator</a>
              <a href="{% url 'about' %}" class="hover:text-red-500 transition">About</a>
              <a href="{% url 'services' %}" class="hover:text-red-500 transition">Services</a>
              <a href="{% url 'contact' %}" class="hover:text-red-500 transition">Contact</a>

          </nav>

          <div class="flex items-center gap-2 md:gap-4 md:border-l md:pl-6 border-gray-200">
             
            <a href="/admin/" class="hidden sm:flex items-center gap-2 text-gray-700 font-medium hover:text-red-500 transition">
                  <i class="fa-regular fa-user"></i> Login/Register
              </a>
           

              <button id="openMenu" class="xl:hidden text-2xl text-gray-700">
                  <i class="fa-solid fa-bars-staggered"></i>
              </button>
          </div>
      </div>
    </div>

    <div class="mt-3 md:hidden">
        <form action="{% url 'search_projects' %}" method="GET" class="relative">
            <input type="text" name="q" placeholder="Search projects..." class="w-full bg-gray-100 border-none py-2 px-5 rounded-lg focus:ring-2 focus:ring-red-400 outline-none text-sm">
            <button type="submit" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </form>
    </div>
  </div>
</header>

<div id="mobileDrawer" class="fixed top-0 right-0 w-[75%] h-full bg-white shadow-2xl translate-x-full transition-transform duration-300 z-[999] flex flex-col">
    <div class="flex items-center justify-between px-6 py-5 border-b">
          <a href="/" class="flex-shrink-0">
            {% if settings_obj.logo %}
              <img src="{{ settings_obj.logo.url }}" class="h-8 md:h-12 object-contain">
            {% else %}
              <div class="text-xl md:text-2xl font-bold text-[#ff5a5f] flex items-center gap-1">
                <i class="fa-solid fa-house-chimney"></i> <span class="hidden xs:inline">RealtyPro</span>
              </div>
            {% endif %}
          </a>

        <button id="closeMenu" class="text-3xl text-gray-400">&times;</button>
    </div>
    <nav class="flex-1 overflow-y-auto py-4 font-semibold">
        <a class="flex items-center gap-3 px-6 py-4 border-b border-gray-50" href="/"><i class="fa-solid fa-house text-gray-400"></i> Home</a>
        <a class="flex items-center gap-3 px-6 py-4 border-b border-gray-50" href="{% url 'services' %}"><i class="fa-solid fa-screwdriver-wrench text-gray-400"></i> Services</a>
        <a class="flex items-center gap-3 px-6 py-4 border-b border-gray-50" href="{% url 'search_projects' %}"><i class="fa-solid fa-building text-gray-400"></i> Projects</a>
        <a class="flex items-center gap-3 px-6 py-4 border-b border-gray-50" href="{% url 'calculator' %}"><i class="fa-solid fa-calculator text-gray-400"></i> Calculator</a>
        <a class="flex items-center gap-3 px-6 py-4 border-b border-gray-50" href="{% url 'about' %}"><i class="fa-solid fa-circle-info text-gray-400"></i> About</a>
        <a class="flex items-center gap-3 px-6 py-4 border-b border-gray-50" href="{% url 'contact' %}"><i class="fa-solid fa-phone text-gray-400"></i> Contact</a>

    </nav>
</div>

<div id="drawerOverlay" class="fixed inset-0 bg-black/50 hidden z-[998]"></div>

<script>
    const openMenu = document.getElementById("openMenu");
    const closeMenu = document.getElementById("closeMenu");
    const drawer = document.getElementById("mobileDrawer");
    const overlay = document.getElementById("drawerOverlay");

    openMenu.onclick = () => {
        drawer.classList.remove("translate-x-full");
        overlay.classList.remove("hidden");
    };

    closeMenu.onclick = () => {
        drawer.classList.add("translate-x-full");
        overlay.classList.add("hidden");
    };
    overlay.onclick = closeMenu.onclick;
    const menuButton = document.getElementById('menu-button');
    const dropdownMenu = document.getElementById('dropdown-menu');

    menuButton.addEventListener('click', () => {
      dropdownMenu.classList.toggle('hidden');
    });

    // Close dropdown if user clicks outside
    window.addEventListener('click', (event) => {
      if (!menuButton.contains(event.target) && !dropdownMenu.contains(event.target)) {
        dropdownMenu.classList.add('hidden');
      }
    });
</script>
