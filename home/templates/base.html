{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ settings_obj.meta_title }}{% endblock %}</title>
  <meta name="description" content="{{ settings_obj.meta_description }}">
  <meta name="keywords" content="{{ settings_obj.meta_keywords }}">
  <link rel="icon" href="{{ settings_obj.favicon.url }}" type="image/png">
  <link rel="apple-touch-icon" href="{{ settings_obj.favicon.url }}">
  <script src="https://unpkg.com/lucide@latest" defer></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <script src="https://www.google.com/recaptcha/api.js?render=6LdgIDUsAAAAABGkx3xhZfup6EXvsaZh5RQ5Q61" async defer></script>
  <script src="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <!-- Google Tag Manager -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-{{ settings_obj.googletagmanager }}');</script>
  <!-- End Google Tag Manager -->

</head>

<body>

  <!-- Google Tag Manager (noscript) -->
  <noscript>
    <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-{{ settings_obj.googletagmanager }}" height="0" width="0" style="display:none;visibility:hidden"></iframe>
  </noscript>
  <!-- End Google Tag Manager (noscript) -->

  {% include 'includes/header.html' %}

    <main>
      {% block content %}{% endblock %}
    </main>

    {% include 'includes/footer.html' %}

  <div class="fixed bottom-6 right-6 flex flex-col gap-4 z-50">

    <button onclick="toggleEnquiryModal()" class="bg-orange-500 hover:bg-orange-600 text-white p-2.5 rounded-full shadow-lg transition-transform hover:scale-110 flex items-center justify-center w-14 h-14" aria-label="Enquiry">
      <i class="fas fa-envelope text-xl"></i>
   </button>
    
    <a href="https://wa.me/{{settings_obj.whatsapp}}" target="_blank" class="bg-[#25D366] hover:bg-[#128C7E] text-white p-2.5 rounded-full shadow-lg transition-transform hover:scale-110 flex items-center justify-center w-14 h-14" aria-label="Chat on WhatsApp">
      <i class="fab fa-whatsapp text-2xl"></i>
    </a>

    <a href="tel:+91{{settings_obj.phone}}" class="bg-blue-600 hover:bg-blue-700 text-white p-2.5 rounded-full shadow-lg transition-transform hover:scale-110 flex items-center justify-center w-14 h-14" aria-label="Call Us">
      <i class="fa-solid fa-phone-volume text-xl"></i>
    </a>
    
  </div>

  <script defer>
    document.addEventListener("DOMContentLoaded", function () {
      const faqData = document.querySelectorAll("#faqData .faq-item");
      const faqContainer = document.getElementById("faqContainer");
      const loadMoreBtn = document.getElementById("loadMoreBtn");
      const showLessBtn = document.getElementById("showLessBtn");

      if (!faqContainer) return;

      let itemsToShow = 6;

      function renderFAQs() {
        faqContainer.innerHTML = "";
        faqData.forEach((item, index) => {
          if (index < itemsToShow) {
            faqContainer.appendChild(item.cloneNode(true));
          }
        });
        loadMoreBtn?.classList.toggle("hidden", itemsToShow >= faqData.length);
        showLessBtn?.classList.toggle("hidden", itemsToShow <= 6);
      }

      renderFAQs();

      loadMoreBtn?.addEventListener("click", () => {
        itemsToShow += 6;
        renderFAQs();
      });

      showLessBtn?.addEventListener("click", () => {
        itemsToShow = 6;
        renderFAQs();
        window.scrollTo({ top: faqContainer.offsetTop - 100, behavior: "smooth" });
      });
    });
    function toggleEnquiryModal() {
      const modal = document.getElementById('enquiryModal');
      if (modal.classList.contains('hidden')) {
        modal.classList.remove('hidden');
      } else {
        modal.classList.add('hidden');
      }
    }

    // Modal ke bahar click karne par band ho jaye
    window.onclick = function(event) {
      const modal = document.getElementById('enquiryModal');
      if (event.target == modal) {
        modal.classList.add('hidden');
      }
    }
  </script>

  <div id="enquiryModal" class="fixed inset-0 bg-black bg-opacity-50 z-[60] hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-lg p-6 w-full max-w-md relative shadow-2xl">
      <button onclick="toggleEnquiryModal()" class="absolute top-3 right-3 text-gray-500 hover:text-black">
        <i class="fas fa-times"></i>
      </button>
      
      <h3 class="text-xl font-bold mb-4">Enquiry Form</h3>
      
      <form action="{% url 'contact' %}" method="POST" class="space-y-4 border border-gay-400 p-4">
        {% csrf_token %}

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

          <!-- Name -->
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">
              Full Name
            </label>
            <input type="text" name="name" required class="w-full  border border-slate-200 bg-slate-50 px-3 py-2.5 text-sm outline-none focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-100"  placeholder="Enter your name">
          </div>

          <!-- Phone -->
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">
              Phone Number
            </label>
            <input type="tel" name="phone" class="w-full  border border-slate-200 bg-slate-50 px-3 py-2.5 text-sm outline-none focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-100" placeholder="98765 43210">
          </div>

        </div>

        <!-- Email -->
        <div>
          <label class="block text-xs font-medium text-slate-600 mb-1">
            Email Address
          </label>
          <input type="email" name="email" required class="w-full  border border-slate-200 bg-slate-50 px-3 py-2.5 text-sm outline-none focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-100" placeholder="you@example.com">
        </div>

        <!-- Subject -->
        <div>
          <label class="block text-xs font-medium text-slate-600 mb-1">
            Subject
          </label>
          <input type="text" name="subject" class="w-full  border border-slate-200 bg-slate-50 px-3 py-2.5 text-sm outline-none focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-100" placeholder="How can we help you?">
        </div>

        <!-- Message -->
        <div>
          <label class="block text-xs font-medium text-slate-600 mb-1">
            Message
          </label>
          <textarea name="message" rows="4" required class="w-full border border-slate-200 bg-slate-50 px-3 py-2.5 text-sm outline-none focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-100 resize-none" placeholder="Tell us how we can assist you — our team will get back to you shortly..."></textarea>
       
           <label class="inline-flex items-start gap-2 text-xs text-slate-500">
            <input required type="checkbox" class="mt-0.5 h-4 w-4 border border-gray-400 rounded-sm appearance-auto">
            I provide my informed consent for {{settings_obj.site_name}} to reach out to me.
          </label>

        </div>

        <!-- Consent + Button -->
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 pt-2">
         
          <button type="submit" class="w-full md:w-auto inline-flex items-center justify-center  bg-indigo-600 px-7 py-3 text-sm font-semibold text-white shadow hover:bg-indigo-700 transition-all duration-200">
            Send Message
          </button>
        </div>

      </form>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/countup.js/2.6.2/countUp.umd.js" defer></script>
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js" defer></script>
  <script defer>
    document.addEventListener("DOMContentLoaded", function () {
      AOS.init({
        duration: 800,
        once: true
      });
    });
  </script>



  <!-- ================= JS END ================= -->

</body>
</html>
